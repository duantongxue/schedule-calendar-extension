<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>排班助手</title>
    <style>
        :root {
            --primary: #4A90E2;
            --white: #ffffff;
            --bg: #f0f2f5;
            --text: #333;
            --border: #ececec;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            min-width: 350px;
            /* 适配插件弹窗宽度 */
        }

        /* 顶部设置区：抽屉式/紧凑式 */
        .control-panel {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            margin-bottom: 12px;
            font-size: 13px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        input,
        select {
            height: 36px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 0 8px;
            font-size: 14px;
            outline: none;
            background: #fafafa;
        }

        .btn-save {
            height: 36px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 15px;
            font-weight: 500;
            cursor: pointer;
        }

        /* 日历区 */
        .calendar-card {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .cal-header {
            background: var(--primary);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cal-header h3 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 1px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            padding: 5px;
        }

        .weekday {
            text-align: center;
            color: #999;
            font-size: 12px;
            padding: 10px 0;
            font-weight: bold;
        }

        .day {
            aspect-ratio: 1 / 1.1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            margin: 2px;
            position: relative;
            transition: all 0.2s;
        }

        .day-num {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        /* 班次标签优化：移动端采用圆点或小文字 */
        .shift-label {
            font-size: 10px;
            transform: scale(0.9);
            padding: 1px 4px;
            border-radius: 4px;
        }

        .shift-白班 {
            background: #fff3cd;
            color: #856404;
        }

        .shift-小夜 {
            background: #d1ecf1;
            color: #0c5460;
        }

        .shift-大夜 {
            background: #f8d7da;
            color: #721c24;
        }

        .is-today {
            background: #eef6ff !important;
            border: 1.5px solid var(--primary);
        }

        .other-month {
            opacity: 0.1;
        }

        /* 移动端适配小屏幕 */
        @media (max-width: 380px) {
            body {
                padding: 5px;
                min-width: 320px;
            }

            .day-num {
                font-size: 13px;
            }

            .shift-label {
                font-size: 9px;
            }
        }
    </style>
</head>

<body>

    <div class="control-panel">
        <div class="input-group">
            <div class="input-item">
                <label>基准日期</label>
                <input type="date" id="baseDateInput">
            </div>
            <div class="input-item">
                <label>对应班次</label>
                <select id="baseShiftInput">
                    <option value="0">白班</option>
                    <option value="1">小夜</option>
                    <option value="2">大夜</option>
                </select>
            </div>
            <button class="btn-save">保存</button>
        </div>
    </div>

    <div class="calendar-card">
        <div class="cal-header">
            <div class="nav-btn">❮</div>
            <h3 id="currentViewTitle">加载中...</h3>
            <div class="nav-btn">❯</div>
        </div>
        <div class="cal-grid" id="calendarGrid"></div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
